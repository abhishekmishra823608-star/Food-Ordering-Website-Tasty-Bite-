<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login | TastyBite</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<nav class="navbar">
  <div class="nav-container">
    <a href="index.html" class="logo">&#127828;Tasty<span>Bite</span></a>
    <div class="nav-overlay" id="navOverlay"></div>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html" data-page="index.html">Home</a></li>
      <li><a href="menu.html" data-page="menu.html">Menu</a></li>
      <li><a href="cart.html" data-page="cart.html">Cart</a></li>
      <li><a href="order-history.html" data-page="order-history.html">Orders</a></li>
      <li><a href="login.html" id="authLink" data-page="login.html" class="active">Login</a></li>
    </ul>
    <div class="nav-actions">
      <a href="cart.html" class="icon-btn">&#128722;<span class="badge" id="cartBadge">0</span></a>
      <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
    </div>
  </div>
</nav>

<section class="form-page">
  <div class="container">
    <form class="form-card" id="loginForm" novalidate>
      <h2>Welcome Back</h2>
      <p class="sub">Login to track orders and check out faster</p>

      <div class="form-group" id="group-email">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com" />
        <span class="error-text">Please enter a valid email</span>
      </div>

      <div class="form-group" id="group-password">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" />
        <span class="error-text">Password must be at least 6 characters</span>
      </div>

      <button type="submit" class="btn btn-primary btn-block" id="loginBtn">Login</button>

      <p class="form-footer-text">Don't have an account? <a href="register.html">Register here</a></p>
    </form>
  </div>
</section>

<footer class="footer">
  <div class="footer-bottom">&copy; 2026 TastyBite. All rights reserved.All Design by <a href="#">Abhishek Mishra</div>
</footer>

<script src="js/foods-data.js"></script>
<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/nav.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
